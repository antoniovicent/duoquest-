<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuoQuest</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0b14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#0d0b14; --surface:#161222; --surface2:#211a32; --surface3:#2b2240; --border:#352a4d;
    --purple:#9b5de5; --purple-bright:#b794f6; --pink:#ff5ca8; --green:#4ade80; --blue:#60a5fa;
    --amber:#fbbf24; --text:#f4f1fb; --muted:#9088a8; --danger:#f87171;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:radial-gradient(circle at 20% 0%, #1d1430 0%, #0d0b14 55%), var(--bg);
    color:var(--text); font-family:'Manrope', sans-serif; min-height:100vh; padding-bottom:40px;
  }
  .pixel{font-family:'Press Start 2P', monospace;}
  a{color:inherit;}

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px; border-bottom:1px solid var(--border);
    background:rgba(13,11,20,0.75); backdrop-filter:blur(6px); position:sticky; top:0; z-index:50;
  }
  .topbar-left{display:flex; align-items:center; gap:12px;}
  .hamburger{
    width:38px; height:38px; border-radius:10px; background:var(--surface2); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; color:var(--text);
  }
  .brand{display:flex; align-items:center; gap:8px;}
  .brand-mark{
    width:26px; height:26px; background:var(--purple);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    box-shadow:0 0 14px var(--purple);
  }
  .brand-name{font-size:12px; letter-spacing:1px; font-family:'Press Start 2P';}
  .brand-name span{color:var(--pink);}
  .sync-dot{width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block; margin-right:6px; box-shadow:0 0 6px var(--green);}
  .sync-dot.off{background:var(--danger); box-shadow:0 0 6px var(--danger);}
  .sync-label{font-size:9px; color:var(--muted); display:flex; align-items:center;}

  nav.tabs{display:flex; gap:4px; flex-wrap:wrap; overflow-x:auto;}
  nav.tabs button{
    background:transparent; border:1px solid transparent; color:var(--muted);
    padding:8px 13px; border-radius:10px; cursor:pointer; font-weight:700; font-size:12.5px; transition:.15s; white-space:nowrap;
  }
  nav.tabs button:hover{color:var(--text); background:var(--surface2);}
  nav.tabs button.active{ color:var(--text); background:var(--surface3); border-color:var(--purple); box-shadow:0 0 0 1px var(--purple) inset; }

  .container{max-width:1180px; margin:0 auto; padding:22px 18px;}

  .card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; }
  .grid{display:grid; gap:18px;}
  .grid-2{grid-template-columns:1fr 1fr;}
  @media(max-width:880px){ .grid-2{grid-template-columns:1fr;} }

  h2.section-title{
    font-family:'Press Start 2P'; font-size:14px; margin-bottom:16px; color:var(--purple-bright);
    display:flex; align-items:center; gap:10px;
  }
  h2.section-title::before{content:''; width:8px; height:8px; background:var(--pink); display:inline-block;}

  .drawer-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:90; }
  .drawer{
    position:fixed; top:0; left:0; height:100%; width:260px; background:var(--surface); border-right:1px solid var(--border);
    z-index:91; padding:20px 16px; display:flex; flex-direction:column; gap:6px;
    transform:translateX(-100%); transition:transform .2s ease;
  }
  .drawer.open{transform:translateX(0);}
  .drawer-overlay.hidden, .drawer.closed{display:none;}
  .drawer-item{
    display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:10px; cursor:pointer;
    color:var(--text); font-weight:700; font-size:13.5px; background:transparent; border:1px solid transparent;
  }
  .drawer-item:hover{background:var(--surface2);}
  .drawer-item.active{background:var(--surface3); border-color:var(--purple);}
  .drawer-title{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin:14px 0 4px 14px;}

  .me-toggle{display:flex; gap:8px; margin-bottom:18px;}
  .me-toggle button{
    flex:1; background:var(--surface2); border:1px solid var(--border); color:var(--muted); padding:9px; border-radius:10px;
    font-weight:700; font-size:12.5px; cursor:pointer;
  }
  .me-toggle button.active{background:var(--purple); color:#0d0b14; border-color:var(--purple);}

  .char-hero{ display:flex; gap:22px; align-items:center; flex-wrap:wrap; margin-bottom:22px; }
  .char-avatar-big{ width:150px; height:172px; border-radius:18px; overflow:hidden; border:3px solid; flex-shrink:0; }
  .char-avatar-big img{width:100%; height:100%; object-fit:cover;}
  .char-info{flex:1; min-width:220px;}
  .char-name{font-size:24px; font-weight:800;}
  .char-sub{font-size:13px; color:var(--muted); margin-top:2px;}
  .char-lvl{font-family:'Press Start 2P'; font-size:13px; color:var(--purple-bright); margin-top:10px;}
  .xp-track{height:10px; border-radius:6px; background:var(--surface3); overflow:hidden; margin-top:6px;}
  .xp-fill{height:100%; background:linear-gradient(90deg, var(--purple), var(--pink));}

  .area-mini-list{margin-top:18px; display:flex; flex-direction:column; gap:10px;}
  .area-mini{display:flex; align-items:center; gap:8px; font-size:12.5px;}
  .area-mini .dot{width:10px; height:10px; border-radius:3px; flex-shrink:0;}
  .area-mini .bar{flex:1; height:7px; background:var(--surface3); border-radius:4px; overflow:hidden;}
  .area-mini .bar i{display:block; height:100%; border-radius:4px;}
  .area-mini .lvl{font-family:'Press Start 2P'; font-size:9px; color:var(--muted); width:34px; text-align:right;}

  .rank-strip{display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap;}
  .rank-chip{
    flex:1; min-width:150px; background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:10px;
  }
  .rank-chip .area-dot{width:14px; height:14px; border-radius:3px;}
  .rank-chip .label{font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.5px;}
  .rank-chip .winner{font-weight:800; font-size:13px; margin-top:1px;}

  .btn{
    background:var(--purple); color:#0d0b14; border:none; border-radius:10px;
    padding:10px 16px; font-weight:800; cursor:pointer; font-size:13px; transition:.15s;
  }
  .btn:hover{background:var(--purple-bright);}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .btn.secondary{background:var(--surface3); color:var(--text); border:1px solid var(--border);}
  .btn.secondary:hover{background:var(--surface2);}
  .btn.danger{background:transparent; color:var(--danger); border:1px solid var(--danger); padding:6px 10px; font-size:12px;}
  .btn.small{padding:6px 10px; font-size:12px;}

  input, select, textarea{
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:9px 11px; border-radius:9px; font-family:inherit; font-size:13px; width:100%;
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--purple); outline-offset:1px;}
  label{font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; display:block;}
  .field{margin-bottom:12px;}
  .form-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .form-card{background:var(--surface2); border:1px dashed var(--border); border-radius:14px; padding:16px; margin-bottom:20px;}

  .list-item{
    display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px;
    background:var(--surface2); border:1px solid var(--border); margin-bottom:8px;
  }
  .list-item.done{opacity:.5;}
  .list-item .check{
    width:22px; height:22px; border-radius:6px; border:2px solid var(--purple); cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:13px;
  }
  .list-item.done .check{background:var(--purple);}
  .item-main{flex:1;}
  .item-title{font-weight:700; font-size:14px;}
  .item-title.strike{text-decoration:line-through;}
  .item-sub{font-size:11px; color:var(--muted); margin-top:2px; display:flex; gap:8px; flex-wrap:wrap;}
  .tag{font-size:10px; padding:2px 7px; border-radius:6px; font-weight:800; text-transform:uppercase; letter-spacing:.4px;}
  .tag.shared{background:rgba(255,92,168,0.18); color:var(--pink);}
  .tag.solo{background:rgba(155,93,229,0.18); color:var(--purple-bright);}
  .tag.area{background:var(--surface3); color:var(--muted);}

  .empty-state{text-align:center; padding:30px 10px; color:var(--muted); font-size:13px;}

  .subtabs{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .subtabs button{
    background:var(--surface2); border:1px solid var(--border); color:var(--muted);
    padding:7px 14px; border-radius:9px; font-size:12px; font-weight:700; cursor:pointer;
  }
  .subtabs button.active{background:var(--purple); color:#0d0b14; border-color:var(--purple);}

  .expense-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px;}
  .expense-row:last-child{border-bottom:none;}
  .expense-amt.in{color:var(--green); font-weight:800;}
  .expense-amt.out{color:var(--danger); font-weight:800;}
  .totals-row{display:flex; gap:14px; margin-bottom:16px; flex-wrap:wrap;}
  .total-pill{background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 16px; flex:1; min-width:130px;}
  .total-pill .v{font-family:'Press Start 2P'; font-size:14px; margin-top:4px;}
  .total-pill .l{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;}

  .goal-card{
    background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:13px 14px;
    margin-bottom:8px; display:flex; align-items:center; gap:12px;
  }
  .goal-card .goal-info{flex:1;}
  .goal-card .goal-title{font-weight:700; font-size:13.5px;}
  .goal-card .goal-sub{font-size:11px; color:var(--muted); margin-top:2px;}
  .goal-xp{font-family:'Press Start 2P'; font-size:10px; color:var(--amber);}

  .badges-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;}
  .badge{
    width:54px; height:54px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:22px; border:2px solid var(--border); background:var(--surface2);
  }
  .badge.unlocked{border-color:var(--amber); background:rgba(251,191,36,0.12); box-shadow:0 0 10px rgba(251,191,36,0.25);}
  .badge.locked{filter:grayscale(1); opacity:.35;}

  .ach-card{
    background:var(--surface2); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:14px;
    display:flex; gap:0;
  }
  .ach-img{width:96px; height:96px; object-fit:cover; flex-shrink:0; background:var(--surface3);}
  .ach-img.placeholder{display:flex; align-items:center; justify-content:center; font-size:28px;}
  .ach-body{padding:12px 14px; flex:1;}
  .ach-title{font-weight:800; font-size:14px;}
  .ach-date{font-size:10px; color:var(--muted); margin-top:1px;}
  .ach-desc{font-size:12.5px; color:var(--muted); margin-top:6px; line-height:1.4;}

  .hidden{display:none !important;}
  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--surface3); border:1px solid var(--purple);
    padding:12px 18px; border-radius:10px; font-size:13px; font-weight:700; box-shadow:0 0 18px rgba(155,93,229,0.3);
    z-index:200; animation:slideIn .25s ease; max-width:300px;
  }
  .toast.error{border-color:var(--danger); box-shadow:0 0 18px rgba(248,113,113,0.3);}
  @keyframes slideIn{from{transform:translateY(20px); opacity:0;} to{transform:translateY(0); opacity:1;}}

  .boot-screen{
    position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--bg); z-index:999; gap:14px;
  }
  .boot-screen .pixel{font-size:13px; color:var(--purple-bright);}
  .boot-bar{width:200px; height:8px; background:var(--surface2); border-radius:6px; overflow:hidden;}
  .boot-bar i{display:block; height:100%; width:40%; background:linear-gradient(90deg, var(--purple), var(--pink)); animation:boot 1.1s infinite;}
  @keyframes boot{0%{margin-left:-40%;} 100%{margin-left:100%;}}
</style>
</head>

<div class="boot-screen" id="bootScreen">
  <div class="brand-mark"></div>
  <div class="pixel">CARREGANDO DUOQUEST...</div>
  <div class="boot-bar"><i></i></div>
</div>

<div class="drawer-overlay hidden" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer closed" id="drawer"></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="hamburger" onclick="openDrawer()">☰</div>
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">DUO<span>QUEST</span></div>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:10px;">
    <span class="sync-label" id="syncLabel"><span class="sync-dot" id="syncDot"></span>conectando...</span>
  </div>
</div>
<div class="container" style="padding-bottom:0;">
  <nav class="tabs" id="tabNav" style="margin-bottom:18px;"></nav>
</div>

<div class="container" id="app"></div>

<script>
const SUPABASE_URL = 'https://advxktmidfdhirdgkknh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdnhrdG1pZGZkaGlyZGdra25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNDg0MzIsImV4cCI6MjA5NzcyNDQzMn0.7DUIVCCDB-qPmAfUH0PmW3z3huy81PnQISn-X4f3MDc';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function setSync(ok, label){
  document.getElementById('syncDot').classList.toggle('off', !ok);
  document.getElementById('syncLabel').lastChild.textContent = label;
}

const AREAS = {
  saude:   { name:'Saúde',        color:'#4ade80', icon:'💪' },
  dev:     { name:'Desenvolvimento', color:'#fbbf24', icon:'📚' },
  trabalho:{ name:'Trabalho',     color:'#60a5fa', icon:'💼' },
  casal:   { name:'Casal',        color:'#ff5ca8', icon:'❤️' },
};

let state = {
  activeTab: 'inicio',
  players: {},
  tasks: [],
  expensesPersonal: { p1:[], p2:[] },
  expensesShared: [],
  goals: [],
  dateNight: null,
  weeklyChallenge: null,
  coupleStreak: { count:0, lastDate:null },
  achievements: [],
};
window.__meId = 'p1';

function todayISO(){ return new Date().toISOString().slice(0,10); }
function addDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

async function loadAll(){
  try{
    const [playersR, tasksR, expPR, expSR, goalsR, dnR, wcR, csR, achR] = await Promise.all([
      sb.from('players').select('*'),
      sb.from('tasks').select('*'),
      sb.from('expenses_personal').select('*'),
      sb.from('expenses_shared').select('*'),
      sb.from('goals').select('*'),
      sb.from('date_night').select('*').eq('id',1).maybeSingle(),
      sb.from('weekly_challenge').select('*').eq('id',1).maybeSingle(),
      sb.from('couple_streak').select('*').eq('id',1).maybeSingle(),
      sb.from('achievements').select('*').order('date', {ascending:false}),
    ]);

    const firstErr = [playersR, tasksR, expPR, expSR, goalsR, dnR, wcR, csR, achR].find(r=>r.error);
    if(firstErr) throw firstErr.error;

    state.players = {};
    (playersR.data||[]).forEach(p=>{ state.players[p.id] = { id:p.id, name:p.name, birthdate:p.birthdate, color:p.color, xp:p.xp, avatar_url:p.avatar_url||null }; });

    state.tasks = (tasksR.data||[]).map(t=>({...t}));
    state.expensesPersonal = { p1:[], p2:[] };
    (expPR.data||[]).forEach(e=>{ state.expensesPersonal[e.owner] = state.expensesPersonal[e.owner]||[]; state.expensesPersonal[e.owner].push({ id:e.id, type:e.type, desc:e.description, value:Number(e.value), date:e.date }); });
    state.expensesShared = (expSR.data||[]).map(e=>({ id:e.id, desc:e.description, value:Number(e.value), category:e.category, date:e.date }));
    state.goals = (goalsR.data||[]).map(g=>({...g}));

    state.dateNight = dnR.data ? { date:dnR.data.date, title:dnR.data.title, xp:dnR.data.xp, history:dnR.data.history, done:false } : { date:addDays(6), title:'Encontro a dois', xp:120, history:0, done:false };
    state.weeklyChallenge = wcR.data ? { title:wcR.data.title, xp:wcR.data.xp, weekStart:wcR.data.week_start, doneBy:{p1:wcR.data.done_p1, p2:wcR.data.done_p2}, completedCount:wcR.data.completed_count } : { title:'Cozinhar uma receita nova juntos', xp:50, weekStart:todayISO(), doneBy:{p1:false,p2:false}, completedCount:0 };
    state.coupleStreak = csR.data ? { count:csR.data.count, lastDate:csR.data.last_date } : { count:0, lastDate:null };
    state.achievements = (achR.data||[]).map(a=>({...a}));

    setSync(true, 'sincronizado');
    document.getElementById('bootScreen').classList.add('hidden');
    render();
  }catch(err){
    console.error(err);
    setSync(false, 'erro de conexão');
    document.getElementById('bootScreen').innerHTML = `
      <div class="pixel" style="color:var(--danger); text-align:center; padding:0 20px;">FALHA AO CONECTAR</div>
      <div style="color:var(--muted); font-size:13px; max-width:320px; text-align:center;">${err.message||'Verifique se as tabelas foram criadas.'}</div>
      <button class="btn" onclick="location.reload()">Tentar de novo</button>
    `;
  }
}

function levelFromXp(xp){
  let level = Math.floor(Math.sqrt(xp/25)) + 1;
  let xpForLevel = (lv)=> 25*(lv-1)*(lv-1);
  let curLevelXp = xpForLevel(level);
  let nextLevelXp = xpForLevel(level+1);
  let progress = (xp-curLevelXp)/(nextLevelXp-curLevelXp);
  return { level, progress: Math.max(0,Math.min(1,progress)), curLevelXp, nextLevelXp };
}
function totalXp(player){ return Object.values(player.xp).reduce((a,b)=>a+b,0); }
function age(birthdate){
  const b = new Date(birthdate), now = new Date();
  let a = now.getFullYear()-b.getFullYear();
  if(now.getMonth()<b.getMonth() || (now.getMonth()===b.getMonth() && now.getDate()<b.getDate())) a--;
  return a;
}
function fmtMoney(v){ return 'R$ ' + v.toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(iso){ const [y,m,d] = iso.split('-'); return `${d}/${m}`; }
function daysBetween(isoA, isoB){ return Math.round((new Date(isoA)-new Date(isoB))/(1000*60*60*24)) * -1; }
function otherId(id){ return id==='p1' ? 'p2' : 'p1'; }

async function grantXp(owner, area, amount){
  if(owner==='both'){
    state.players.p1.xp[area] = (state.players.p1.xp[area]||0)+amount;
    state.players.p2.xp[area] = (state.players.p2.xp[area]||0)+amount;
    await Promise.all([persistPlayer('p1'), persistPlayer('p2')]);
  } else {
    state.players[owner].xp[area] = (state.players[owner].xp[area]||0)+amount;
    await persistPlayer(owner);
  }
}
async function persistPlayer(id){
  const p = state.players[id];
  const { error } = await sb.from('players').update({ name:p.name, birthdate:p.birthdate, color:p.color, xp:p.xp, avatar_url:p.avatar_url||null }).eq('id', id);
  if(error) toast('Erro ao salvar: '+error.message, true);
}
function compressImage(file, maxSize=400, quality=0.82){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w>h){ if(w>maxSize){ h = h*(maxSize/w); w = maxSize; } }
        else { if(h>maxSize){ w = w*(maxSize/h); h = maxSize; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function handleAvatarUpload(id, input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 8*1024*1024){ toast('Imagem muito grande, escolha uma menor.', true); return; }
  toast('Enviando foto...');
  try{
    const dataUrl = await compressImage(file);
    state.players[id].avatar_url = dataUrl;
    await persistPlayer(id);
    render();
    toast('Foto atualizada! 📸');

async function recordSharedActivity(){
  const today = todayISO();
  const s = state.coupleStreak;
  if(s.lastDate === today) return;
  if(s.lastDate && daysBetween(s.lastDate, today) === 1){ s.count += 1; } else { s.count = 1; }
  s.lastDate = today;
  const { error } = await sb.from('couple_streak').update({ count:s.count, last_date:s.lastDate }).eq('id',1);
  if(error) toast('Erro ao salvar streak: '+error.message, true);
}

function pixelAvatar(color, size=64){
  return `<svg width="${size}" height="${size*1.15}" viewBox="0 0 16 18" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
    <rect x="5" y="0" width="6" height="2" fill="#3a2c1a"/><rect x="4" y="1" width="1" height="2" fill="#3a2c1a"/><rect x="11" y="1" width="1" height="2" fill="#3a2c1a"/>
    <rect x="5" y="2" width="6" height="4" fill="#f3c08a"/><rect x="6" y="4" width="1" height="1" fill="#1a1422"/><rect x="9" y="4" width="1" height="1" fill="#1a1422"/>
    <rect x="4" y="6" width="8" height="5" fill="${color}"/><rect x="4" y="6" width="8" height="1" fill="${shade(color,-20)}"/>
    <rect x="2" y="7" width="2" height="4" fill="${shade(color,-10)}"/><rect x="12" y="7" width="2" height="4" fill="${shade(color,-10)}"/>
    <rect x="2" y="11" width="2" height="1" fill="#f3c08a"/><rect x="12" y="11" width="2" height="1" fill="#f3c08a"/>
    <rect x="4" y="11" width="3" height="5" fill="#2b2240"/><rect x="9" y="11" width="3" height="5" fill="#2b2240"/>
    <rect x="4" y="16" width="3" height="2" fill="#161222"/><rect x="9" y="16" width="3" height="2" fill="#161222"/>
  </svg>`;
}
function shade(hex, percent){
  const f=parseInt(hex.slice(1),16), t=percent<0?0:255, p=Math.abs(percent)/100;
  const R=f>>16, G=(f>>8)&0x00FF, B=f&0x0000FF;
  const r=Math.round((t-R)*p)+R, g=Math.round((t-G)*p)+G, b=Math.round((t-B)*p)+B;
  return "#"+(0x1000000+r*0x10000+g*0x100+b).toString(16).slice(1);
}
function renderAvatar(p, size=60){
  if(p.avatar_url){
    return `<div style="width:${size}px; height:${size*1.15}px; border-radius:10px; overflow:hidden; border:2px solid ${p.color}; box-shadow:0 0 10px ${p.color}55;">
      <img src="${p.avatar_url}" style="width:100%; height:100%; object-fit:cover;"></div>`;
  }
  return pixelAvatar(p.color, size);
}

async function addGoal(areaKey){
  const title = document.getElementById('g-title').value.trim();
  if(!title){ toast('Escreva o título da meta 🙂'); return; }
  const payload = { area: areaKey, title, owner: document.getElementById('g-owner').value, xp: parseInt(document.getElementById('g-xp').value)||20, done:false };
  const { data, error } = await sb.from('goals').insert(payload).select().single();
  if(error){ toast('Erro ao salvar: '+error.message, true); return; }
  state.goals.push(data);
  render();
  toast('Meta criada! Vão com tudo 🚀');
}
async function toggleGoal(id){
  const g = state.goals.find(x=>x.id===id);
  const wasNotDone = !g.done;
  g.done = !g.done;
  const { error } = await sb.from('goals').update({ done:g.done }).eq('id', id);
  if(error){ toast('Erro ao salvar: '+error.message, true); }
  if(g.done && wasNotDone){
    await grantXp(g.owner, g.area, g.xp);
    if(g.owner==='both') await recordSharedActivity();
    toast(`+${g.xp} XP conquistado! 🏆`);
  }
  render();
}

async function completeDateNight(){
  const dn = state.dateNight;
  await grantXp('both', 'casal', dn.xp);
  await recordSharedActivity();
  dn.history += 1;
  dn.date = addDays(14);
  const { error } = await sb.from('date_night').update({ date: dn.date, history: dn.history }).eq('id',1);
  if(error){ toast('Erro ao salvar: '+error.message, true); }

async function markChallengeDone(player){
  const c = state.weeklyChallenge;
  c.doneBy[player] = true;
  const patch = player==='p1' ? {done_p1:true} : {done_p2:true};
  let err1 = (await sb.from('weekly_challenge').update(patch).eq('id',1)).error;
  if(err1) toast('Erro ao salvar: '+err1.message, true);
  if(c.doneBy.p1 && c.doneBy.p2){
    await grantXp('both', 'casal', c.xp);
    c.completedCount += 1;
    await recordSharedActivity();
    await sb.from('weekly_challenge').update({ completed_count: c.completedCount }).eq('id',1);
    toast(`Desafio da semana concluído pelos dois! +${c.xp} XP 🏆`);
  } else {
    toast(`${state.players[player].name} confirmou! Falta o outro completar.`);
  }
  render();
}
async function newWeeklyChallenge(){
  const title = document.getElementById('wc-title').value.trim();
  if(!title){ toast('Escreva o desafio da semana 🙂'); return; }
  const xp = parseInt(document.getElementById('wc-xp').value)||50;
  const weekStart = todayISO();
  const { error } = await sb.from('weekly_challenge').update({ title, xp, week_start: weekStart, done_p1:false, done_p2:false }).eq('id',1);
  if(error){ toast('Erro ao salvar: '+error.message, true); return; }
  state.weeklyChallenge = { title, xp, weekStart, doneBy:{p1:false,p2:false}, completedCount: state.weeklyChallenge.completedCount };
  render();
  toast('Novo desafio da semana definido!');
}

async function toggleTask(id){
  const t = state.tasks.find(x=>x.id===id);
  t.done = !t.done;
  const { error } = await sb.from('tasks').update({ done:t.done }).eq('id', id);
  if(error){ toast('Erro ao salvar: '+error.message, true); }
  if(t.done && t.area){
    await grantXp(t.shared ? 'both' : t.owner, t.area, 10);
    if(t.shared) await recordSharedActivity();
    toast('+10 XP! 🎮');
  }
  render();
}
async function deleteTask(id){
  const { error } = await sb.from('tasks').delete().eq('id', id);
  if(error){ toast('Erro ao excluir: '+error.message, true); return; }
  state.tasks = state.tasks.filter(x=>x.id!==id);
  render();
}

function renderMoney(){
  const sub = window.__moneyTab || 'p1';
  const tabsHtml = `
    <div class="subtabs">
      <button class="${sub==='p1'?'active':''}" onclick="setMoneyTab('p1')">${state.players.p1.name}</button>
      <button class="${sub==='p2'?'active':''}" onclick="setMoneyTab('p2')">${state.players.p2.name}</button>
      <button class="${sub==='shared'?'active':''}" onclick="setMoneyTab('shared')">Gastos do casal</button>
    </div>`;

  if(sub==='shared'){
    const list = state.expensesShared;
    const total = list.reduce((a,b)=>a+b.value,0);
    return `
    <h2 class="section-title">Gastos</h2>
    <div class="card">
      ${tabsHtml}
      <div class="totals-row"><div class="total-pill"><div class="l">Total gasto juntos</div><div class="v" style="color:var(--pink)">${fmtMoney(total)}</div></div></div>
      <div class="form-card">
        <div class="form-row">
          <div class="field"><label>Descrição</label><input id="s-desc" placeholder="Ex: Jantar fora"></div>
          <div class="field"><label>Valor (R$)</label><input id="s-value" type="number" step="0.01" placeholder="0,00"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>Categoria</label><input id="s-cat" placeholder="Ex: Lazer, Viagem, Casa"></div>
          <div class="field"><label>Data</label><input id="s-date" type="date" value="${todayISO()}"></div>
        </div>
        <button class="btn" onclick="addShared()">+ Adicionar gasto compartilhado</button>
      </div>
      ${list.length ? list.map(e=>`
        <div class="expense-row">
          <div>${e.desc} <span style="color:var(--muted); font-size:11px;">· ${e.category} · ${fmtDate(e.date)}</span></div>
          <div class="expense-amt out">${fmtMoney(e.value)}</div>
        </div>`).join('') : `<div class="empty-state">Nenhum gasto em conjunto registrado ainda.</div>`}
    </div>`;
  }

  const list = state.expensesPersonal[sub]||[];
  const gastos = list.filter(e=>e.type==='gasto').reduce((a,b)=>a+b.value,0);
  const receb = list.filter(e=>e.type==='recebivel').reduce((a,b)=>a+b.value,0);
  return `
  <h2 class="section-title">Gastos</h2>
  <div class="card">
    ${tabsHtml}
    <div class="totals-row">
      <div class="total-pill"><div class="l">Recebíveis</div><div class="v" style="color:var(--green)">${fmtMoney(receb)}</div></div>
      <div class="total-pill"><div class="l">Gastos</div><div class="v" style="color:var(--danger)">${fmtMoney(gastos)}</div></div>
      <div class="total-pill"><div class="l">Saldo</div><div class="v" style="color:var(--purple-bright)">${fmtMoney(receb-gastos)}</div></div>
    </div>
    <div class="form-card">
      <div class="form-row">
        <div class="field"><label>Descrição</label><input id="m-desc" placeholder="Ex: Salário, Mercado..."></div>
        <div class="field"><label>Tipo</label><select id="m-type"><option value="gasto">Gasto</option><option value="recebivel">Recebível</option></select></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Valor (R$)</label><input id="m-value" type="number" step="0.01" placeholder="0,00"></div>
        <div class="field"><label>Data</label><input id="m-date" type="date" value="${todayISO()}"></div>
      </div>
      <button class="btn" onclick="addPersonal('${sub}')">+ Adicionar lançamento</button>
    </div>
    ${list.length ? list.slice().reverse().map(e=>`
      <div class="expense-row">
        <div>${e.desc} <span style="color:var(--muted); font-size:11px;">· ${fmtDate(e.date)}</span></div>
        <div class="expense-amt ${e.type==='recebivel'?'in':'out'}">${e.type==='recebivel'?'+':'-'} ${fmtMoney(e.value)}</div>
      </div>`).join('') : `<div class="empty-state">Sem lançamentos pessoais ainda.</div>`}
  </div>`;
}
function setMoneyTab(t){ window.__moneyTab=t; render(); }
async function addPersonal(who){
  const desc = document.getElementById('m-desc').value.trim();
  const value = parseFloat(document.getElementById('m-value').value);
  if(!desc || !value){ toast('Preencha descrição e valor 🙂'); return; }
  const payload = { owner: who, type: document.getElementById('m-type').value, description: desc, value, date: document.getElementById('m-date').value||todayISO() };
  const { data, error } = await sb.from('expenses_personal').insert(payload).select().single();
  if(error){ toast('Erro ao salvar: '+error.message, true); return; }
  state.expensesPersonal[who].push({ id:data.id, type:data.type, desc:data.description, value:Number(data.value), date:data.date });
  render();
  toast('Lançamento adicionado!');
}
async function addShared(){
  const desc = document.getElementById('s-desc').value.trim();
  const value = parseFloat(document.getElementById('s-value').value);
  if(!desc || !value){ toast('Preencha descrição e valor 🙂'); return; }
  const payload = { description: desc, value, category: document.getElementById('s-cat').value||'Geral', date: document.getElementById('s-date').value||todayISO() };
  const { data, error } = await sb.from('expenses_shared').insert(payload).select().single();
  if(error){ toast('Erro ao salvar: '+error.message, true); return; }
  state.expensesShared.push({ id:data.id, desc:data.description, value:Number(data.value), category:data.category, date:data.date });
  render();
  toast('Gasto do casal adicionado!');
}

function renderAchievements(){
  const list = state.achievements;
  return `
  <h2 class="section-title">Conquistas</h2>
  <div class="card">
    <div class="form-card">
      <div class="field"><label>Título</label><input id="ach-title" placeholder="Ex: Primeiro encontro"></div>
      <div class="field"><label>Descrição (opcional)</label><textarea id="ach-desc" rows="2" placeholder="Conte a lembrancinha..."></textarea></div>
      <div class="form-row">
        <div class="field"><label>Data</label><input id="ach-date" type="date" value="${todayISO()}"></div>
        <div class="field"><label>Foto (opcional)</label><input type="file" accept="image/*" id="ach-img"></div>
      </div>
      <button class="btn" onclick="addAchievement()">+ Adicionar conquista</button>
    </div>
    ${list.length ? list.map(achCard).join('') : `<div class="empty-state">Nenhuma conquista registrada ainda — adicione a primeira lembrancinha! 🏅</div>`}
  </div>`;
}
function achCard(a){
  const img = a.image_url
    ? `<img class="ach-img" src="${a.image_url}">`
    : `<div class="ach-img placeholder">🏅</div>`;
  return `
  <div class="ach-card">
    ${img}
    <div class="ach-body">
      <div class="ach-title">${a.title}</div>
      <div class="ach-date">${fmtDate(a.date)}</div>
      ${a.description ? `<div class="ach-desc">${a.description}</div>` : ''}
    </div>
  </div>`;
}
async function addAchievement(){
  const title = document.getElementById('ach-title').value.trim();
  if(!title){ toast('Dá um título pra conquista 🙂'); return; }
  const description = document.getElementById('ach-desc').value.trim();
  const date = document.getElementById('ach-date').value || todayISO();
  const fileInput = document.getElementById('ach-img');
  let image_url = null;
  try{
    if(fileInput.files[0]){
      image_url = await compressImage(fileInput.files[0], 500, 0.8);
    }
  }catch(err){ toast('Erro ao processar imagem: '+err.message, true); return; }
  const { data, error } = await sb.from('achievements').insert({ title, description, date, image_url }).select().single();
  if(error){ toast('Erro ao salvar: '+error.message, true); return; }
  state.achievements.unshift(data);
  render();
  toast('Conquista registrada! 🏅💜');
}

function renderProfile(){
  const players = Object.values(state.players);
  return `
  <h2 class="section-title">Perfil</h2>
  <div class="grid grid-2">
    ${players.map(p=>`
      <div class="card">
        <div style="display:flex; gap:16px; align-items:center; margin-bottom:16px;">
          <div class="avatar-box" style="width:70px; height:80px;">${renderAvatar(p,52)}</div>
          <div><div class="player-name" style="font-weight:800;">${p.name}</div><div class="player-sub" style="color:var(--muted); font-size:12px;">${age(p.birthdate)} anos · nasc. ${fmtDate(p.birthdate)}</div></div>
        </div>
        <div class="field"><label>Foto (carta RPG)</label><input type="file" accept="image/*" onchange="handleAvatarUpload('${p.id}', this)"></div>
        <div class="field"><label>Nome</label><input value="${p.name}" onchange="updateField('${p.id}','name', this.value)"></div>
        <div class="field"><label>Data de nascimento</label><input type="date" value="${p.birthdate}" onchange="updateField('${p.id}','birthdate', this.value)"></div>
        <div class="field"><label>Cor do personagem</label><input type="color" value="${p.color}" onchange="updateField('${p.id}','color', this.value)" style="height:38px; padding:3px;"></div>
      </div>
    `).join('')}
  </div>
  <div class="card" style="margin-top:18px;">
    <p style="color:var(--muted); font-size:12.5px; line-height:1.6;">
      ✅ Dados salvos no Supabase — tudo que vocês fizerem aqui persiste entre dispositivos e sessões.
    </p>
  </div>`;
}
async function updateField(id, field, value){
  state.players[id][field] = value;
  await persistPlayer(id);
  render();
}

function toast(msg, isError){
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2800);
}

loadAll();
</script>
</body>
</html>
