<style>

body{background:radial-gradient(circle at 20% 0%, #1d1430 0%, #0d0b14 55%), var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;padding-bottom:40px;}

.sync-label{font-size:10px;color:var(--muted);display:flex;align-items:center;margin-right:14px;}
nav.tabs{display:flex;gap:6px;flex-wrap:wrap;}
nav.tabs button{background:transparent;border:1px solid transparent;color:var(--muted);padding:9px 16px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;transition:.15s;}
nav.tabs button:hover{color:var(--text);background:var(--surface2);}
nav.tabs button.active{color:var(--text);background:var(--surface3);border-color:var(--purple);box-shadow:0 0 0 1px var(--purple) inset;}
.container{max-width:1180px;margin:0 auto;padding:26px 22px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;}
.grid{display:grid;gap:18px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:1fr 1fr 1fr;}
@media(max-width:880px){.grid-2,.grid-3{grid-template-columns:1fr;}nav.tabs{order:3;width:100%;justify-content:center;margin-top:10px;}.topbar{flex-wrap:wrap;}}
h2.section-title{font-family:'Press Start 2P';font-size:14px;margin-bottom:16px;color:var(--purple-bright);display:flex;align-items:center;gap:10px;}
h2.section-title::before{content:'';width:8px;height:8px;background:var(--pink);display:inline-block;}
.players-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px;}
@media(max-width:700px){.players-row{grid-template-columns:1fr;}}
.player-card{background:linear-gradient(160deg, var(--surface2), var(--surface));border:1px solid var(--border);border-radius:18px;padding:18px;position:relative;overflow:hidden;}

.lvl-pill{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-family:'Press Start 2P';font-size:10px;background:var(--purple);color:#0d0b14;padding:4px 8px;border-radius:6px;}

.area-mini-list{margin-top:14px;display:flex;flex-direction:column;gap:8px;}

.rank-strip{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}

.total-pill{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;min-width:130px;}
.total-pill .v{font-family:'Press Start 2P';font-size:14px;margin-top:4px;}

.area-section{margin-bottom:26px;}
.area-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.area-header .area-dot{width:16px;height:16px;border-radius:4px;}

.goal-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.goal-card .goal-info{flex:1;}
.goal-card .goal-title{font-weight:700;font-size:13.5px;}
.goal-card .goal-sub{font-size:11px;color:var(--muted);margin-top:2px;}

.badges-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}

.badge.unlocked{border-color:var(--amber);background:rgba(251,191,36,0.12);box-shadow:0 0 10px rgba(251,191,36,0.25);}
.badge.locked{filter:grayscale(1);opacity:.35;}
.hidden{display:none !important;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface3);border:1px solid var(--purple);padding:12px 18px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 0 18px rgba(155,93,229,0.3);z-index:200;animation:slideIn .25s ease;max-width:300px;}
.toast.error{border-color:var(--danger);box-shadow:0 0 18px rgba(248,113,113,0.3);}
@keyframes slideIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.boot-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:999;gap:14px;}
.boot-screen .pixel{font-size:13px;color:var(--purple-bright);}
.boot-bar{width:200px;height:8px;background:var(--surface2);border-radius:6px;overflow:hidden;}
.boot-bar i{display:block;height:100%;width:40%;background:linear-gradient(90deg, var(--purple), var(--pink));animation:boot 1.1s infinite;}
@keyframes boot{0%{margin-left:-40%;}100%{margin-left:100%;}}

let state={activeTab:'dashboard',players:{},tasks:[],expensesPersonal:{p1:[],p2:[]},expensesShared:[],goals:[],dateNight:null,weeklyChallenge:null,coupleStreak:{count:0,lastDate:null}};
function todayISO(){return new Date().toISOString().slice(0,10);}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
async function loadAll(){
  try{
    const [playersR,tasksR,expPR,expSR,goalsR,dnR,wcR,csR]=await Promise.all([
      sb.from('players').select('*'),
      sb.from('tasks').select('*'),
      sb.from('expenses_personal').select('*'),
      sb.from('expenses_shared').select('*'),
      sb.from('goals').select('*'),
      sb.from('date_night').select('*').eq('id',1).maybeSingle(),
      sb.from('weekly_challenge').select('*').eq('id',1).maybeSingle(),
      sb.from('couple_streak').select('*').eq('id',1).maybeSingle(),
    ]);
    const firstErr=[playersR,tasksR,expPR,expSR,goalsR,dnR,wcR,csR].find(r=>r.error);
    if(firstErr) throw firstErr.error;
    state.players={};
    (playersR.data||[]).forEach(p=>{state.players[p.id]={id:p.id,name:p.name,birthdate:p.birthdate,color:p.color,xp:p.xp,avatar_url:p.avatar_url||null};});
    state.tasks=(tasksR.data||[]).map(t=>({...t}));
    state.expensesPersonal={p1:[],p2:[]};
    (expPR.data||[]).forEach(e=>{state.expensesPersonal[e.owner]=state.expensesPersonal[e.owner]||[];state.expensesPersonal[e.owner].push({id:e.id,type:e.type,desc:e.description,value:Number(e.value),date:e.date});});
    state.expensesShared=(expSR.data||[]).map(e=>({id:e.id,desc:e.description,value:Number(e.value),category:e.category,date:e.date}));
    state.goals=(goalsR.data||[]).map(g=>({...g}));
    state.dateNight=dnR.data?{date:dnR.data.date,title:dnR.data.title,xp:dnR.data.xp,history:dnR.data.history,done:false}:{date:addDays(6),title:'Encontro a dois',xp:120,history:0,done:false};
    state.weeklyChallenge=wcR.data?{title:wcR.data.title,xp:wcR.data.xp,weekStart:wcR.data.week_start,doneBy:{p1:wcR.data.done_p1,p2:wcR.data.done_p2},completedCount:wcR.data.completed_count}:{title:'Cozinhar uma receita nova juntos',xp:50,weekStart:todayISO(),doneBy:{p1:false,p2:false},completedCount:0};
    state.coupleStreak=csR.data?{count:csR.data.count,lastDate:csR.data.last_date}:{count:0,lastDate:null};
    setSync(true,'sincronizado');
    document.getElementById('bootScreen').classList.add('hidden');
    render();
  }catch(err){
    console.error(err);
    setSync(false,'erro de conexão');
    document.getElementById('bootScreen').innerHTML=`<div class="pixel" style="color:var(--danger);text-align:center;padding:0 20px;">FALHA AO CONECTAR</div><div style="color:var(--muted);font-size:13px;max-width:320px;text-align:center;">${err.message||'Verifique a URL/chave do Supabase e se as tabelas foram criadas.'}</div><button class="btn" onclick="location.reload()">Tentar de novo</button>`;
  }
}
function levelFromXp(xp){let level=Math.floor(Math.sqrt(xp/25))+1;let xpForLevel=(lv)=>25*(lv-1)*(lv-1);let curLevelXp=xpForLevel(level);let nextLevelXp=xpForLevel(level+1);let progress=(xp-curLevelXp)/(nextLevelXp-curLevelXp);return {level,progress:Math.max(0,Math.min(1,progress)),curLevelXp,nextLevelXp};}
function totalXp(player){return Object.values(player.xp).reduce((a,b)=>a+b,0);}
function age(birthdate){const b=new Date(birthdate),now=new Date();let a=now.getFullYear()-b.getFullYear();if(now.getMonth()<b.getMonth()||(now.getMonth()===b.getMonth()&&now.getDate()<b.getDate()))a--;return a;}
function fmtMoney(v){return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(iso){const [y,m,d]=iso.split('-');return `${d}/${m}`;}
function daysBetween(isoA,isoB){return Math.round((new Date(isoA)-new Date(isoB))/(1000*60*60*24))*-1;}
async function grantXp(owner,area,amount){
  if(owner==='both'){
    state.players.p1.xp[area]=(state.players.p1.xp[area]||0)+amount;
    state.players.p2.xp[area]=(state.players.p2.xp[area]||0)+amount;
    await Promise.all([persistPlayer('p1'),persistPlayer('p2')]);
  } else {
    state.players[owner].xp[area]=(state.players[owner].xp[area]||0)+amount;
    await persistPlayer(owner);
  }
}
async function persistPlayer(id){
  const p=state.players[id];
  const {error}=await sb.from('players').update({name:p.name,birthdate:p.birthdate,color:p.color,xp:p.xp,avatar_url:p.avatar_url||null}).eq('id',id);
  if(error) toast('Erro ao salvar: '+error.message,true);
}
function compressImage(file,maxSize=300,quality=0.82){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>h){if(w>maxSize){h=h*(maxSize/w);w=maxSize;}}
        else{if(h>maxSize){w=w*(maxSize/h);h=maxSize;}}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject;
      img.src=e.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
async function handleAvatarUpload(id,input){
  const file=input.files[0];
  if(!file) return;
  if(file.size>8*1024*1024){toast('Imagem muito grande, escolha uma menor.',true);return;}
  toast('Enviando foto...');
  try{
    const dataUrl=await compressImage(file);
    state.players[id].avatar_url=dataUrl;
    await persistPlayer(id);
    render();
    toast('Foto atualizada! 📸');
  }catch(err){
    toast('Erro ao processar imagem: '+err.message,true);
  }
}
async function recordSharedActivity(){
  const today=todayISO();
  const s=state.coupleStreak;
  if(s.lastDate===today) return;
  if(s.lastDate&&daysBetween(s.lastDate,today)===1){s.count+=1;}else{s.count=1;}
  s.lastDate=today;
  const {error}=await sb.from('couple_streak').update({count:s.count,last_date:s.lastDate}).eq('id',1);
  if(error) toast('Erro ao salvar streak: '+error.message,true);
}
const TABS=[{id:'dashboard',label:'Início'},{id:'tasks',label:'Tarefas & Eventos'},{id:'money',label:'Gastos'},{id:'goals',label:'Metas & Áreas'},{id:'profile',label:'Perfil'}];
function render(){
  const nav=document.getElementById('tabNav');
  nav.innerHTML=TABS.map(t=>`<button class="${state.activeTab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`).join('');
  const app=document.getElementById('app');
  if(state.activeTab==='dashboard') app.innerHTML=renderDashboard();
  if(state.activeTab==='tasks') app.innerHTML=renderTasks();
  if(state.activeTab==='money') app.innerHTML=renderMoney();
  if(state.activeTab==='goals') app.innerHTML=renderGoals();
  if(state.activeTab==='profile') app.innerHTML=renderProfile();
}
function setTab(id){state.activeTab=id;render();}
function setAvatarStyle(s){window.__avatarStyle=s;render();}
function pixelAvatar(color,size=64){
  return `<svg width="${size}" height="${size*1.15}" viewBox="0 0 16 18" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="0" width="6" height="2" fill="#3a2c1a"/><rect x="4" y="1" width="1" height="2" fill="#3a2c1a"/><rect x="11" y="1" width="1" height="2" fill="#3a2c1a"/><rect x="5" y="2" width="6" height="4" fill="#f3c08a"/><rect x="6" y="4" width="1" height="1" fill="#1a1422"/><rect x="9" y="4" width="1" height="1" fill="#1a1422"/><rect x="4" y="6" width="8" height="5" fill="${color}"/><rect x="4" y="6" width="8" height="1" fill="${shade(color,-20)}"/><rect x="2" y="7" width="2" height="4" fill="${shade(color,-10)}"/><rect x="12" y="7" width="2" height="4" fill="${shade(color,-10)}"/><rect x="2" y="11" width="2" height="1" fill="#f3c08a"/><rect x="12" y="11" width="2" height="1" fill="#f3c08a"/><rect x="4" y="11" width="3" height="5" fill="#2b2240"/><rect x="9" y="11" width="3" height="5" fill="#2b2240"/><rect x="4" y="16" width="3" height="2" fill="#161222"/><rect x="9" y="16" width="3" height="2" fill="#161222"/></svg>`;
}
function shade(hex,percent){const f=parseInt(hex.slice(1),16),t=percent<0?0:255,p=Math.abs(percent)/100;const R=f>>16,G=(f>>8)&0x00FF,B=f&0x0000FF;const r=Math.round((t-R)*p)+R,g=Math.round((t-G)*p)+G,b=Math.round((t-B)*p)+B;return "#"+(0x1000000+r*0x10000+g*0x100+b).toString(16).slice(1);}
function renderAvatar(p,size=60){
  if((window.__avatarStyle||'photo')==='photo'&&p.avatar_url){
    return `<div style="width:${size}px;height:${size*1.15}px;border-radius:10px;overflow:hidden;border:2px solid ${p.color};box-shadow:0 0 10px ${p.color}55;"><img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;"></div>`;
  }
  return pixelAvatar(p.color,size);
}

function setTaskFilter(f){window.__taskFilter=f;render();}
async function addTask(){
  const title=document.getElementById('t-title').value.trim();
  if(!title){toast('Dá um título pra tarefa antes! 😄');return;}
  const payload={type:document.getElementById('t-type').value,title,date:document.getElementById('t-date').value||todayISO(),time:document.getElementById('t-time').value||null,owner:document.getElementById('t-owner').value,shared:document.getElementById('t-shared').checked,area:document.getElementById('t-area').value||null,done:false};
  const {data,error}=await sb.from('tasks').insert(payload).select().single();
  if(error){toast('Erro ao salvar: '+error.message,true);return;}
  state.tasks.push(data);
  render();
  toast('Adicionado à agenda!');
}
async function toggleTask(id){
  const t=state.tasks.find(x=>x.id===id);
  t.done=!t.done;
  const {error}=await sb.from('tasks').update({done:t.done}).eq('id',id);
  if(error){toast('Erro ao salvar: '+error.message,true);}
  if(t.done&&t.area){
    await grantXp(t.shared?'both':t.owner,t.area,10);
    if(t.shared) await recordSharedActivity();
    toast('+10 XP! 🎮');
  }
  render();
}
async function deleteTask(id){
  const {error}=await sb.from('tasks').delete().eq('id',id);
  if(error){toast('Erro ao excluir: '+error.message,true);return;}
  state.tasks=state.tasks.filter(x=>x.id!==id);
  render();
}

async function addGoal(){
  const title=document.getElementById('g-title').value.trim();
  if(!title){toast('Escreva o título da meta 🙂');return;}
  const payload={area:document.getElementById('g-area').value,title,owner:document.getElementById('g-owner').value,xp:parseInt(document.getElementById('g-xp').value)||20,done:false};
  const {data,error}=await sb.from('goals').insert(payload).select().single();
  if(error){toast('Erro ao salvar: '+error.message,true);return;}
  state.goals.push(data);
  render();
  toast('Meta criada! Vão com tudo 🚀');
}
async function toggleGoal(id){
  const g=state.goals.find(x=>x.id===id);
  const wasNotDone=!g.done;
  g.done=!g.done;
  const {error}=await sb.from('goals').update({done:g.done}).eq('id',id);
  if(error){toast('Erro ao salvar: '+error.message,true);}
  if(g.done&&wasNotDone){
    await grantXp(g.owner,g.area,g.xp);
    if(g.owner==='both') await recordSharedActivity();
    toast(`+${g.xp} XP conquistado! 🏆`);
  }
  render();
}
async function completeDateNight(){
  const dn=state.dateNight;
  await grantXp('both','casal',dn.xp);
  await recordSharedActivity();
  dn.history+=1;
  dn.date=addDays(14);
  const {error}=await sb.from('date_night').update({date:dn.date,history:dn.history}).eq('id',1);
  if(error){toast('Erro ao salvar: '+error.message,true);}
  toast(`Encontro registrado! +${dn.xp} XP de Vínculo 💜`);
  render();
}
async function markChallengeDone(player){
  const c=state.weeklyChallenge;
  c.doneBy[player]=true;
  const patch=player==='p1'?{done_p1:true}:{done_p2:true};
  let err1=(await sb.from('weekly_challenge').update(patch).eq('id',1)).error;
  if(err1) toast('Erro ao salvar: '+err1.message,true);
  if(c.doneBy.p1&&c.doneBy.p2){
    await grantXp('both','casal',c.xp);
    c.completedCount+=1;
    await recordSharedActivity();
    await sb.from('weekly_challenge').update({completed_count:c.completedCount}).eq('id',1);
    toast(`Desafio da semana concluído pelos dois! +${c.xp} XP 🏆`);
  } else {
    toast(`${state.players[player].name} confirmou! Falta o outro completar.`);
  }
  render();
}
async function newWeeklyChallenge(){
  const title=document.getElementById('wc-title').value.trim();
  if(!title){toast('Escreva o desafio da semana 🙂');return;}
  const xp=parseInt(document.getElementById('wc-xp').value)||50;
  const weekStart=todayISO();
  const {error}=await sb.from('weekly_challenge').update({title,xp,week_start:weekStart,done_p1:false,done_p2:false}).eq('id',1);
  if(error){toast('Erro ao salvar: '+error.message,true);return;}
  state.weeklyChallenge={title,xp,weekStart,doneBy:{p1:false,p2:false},completedCount:state.weeklyChallenge.completedCount};
  render();
  toast('Novo desafio da semana definido!');
}
function renderProfile(){
  const players=Object.values(state.players);
  return `<h2 class="section-title">Perfil</h2><div class="grid grid-2">${players.map(p=>`<div class="card"><div style="display:flex;gap:16px;align-items:center;margin-bottom:16px;"><div class="avatar-box" style="width:70px;height:80px;">${renderAvatar(p,52)}</div><div><div class="player-name">${p.name}</div><div class="player-sub">${age(p.birthdate)} anos · nasc. ${fmtDate(p.birthdate)}</div></div></div><div class="field"><label>Foto (carta RPG)</label><input type="file" accept="image/*" onchange="handleAvatarUpload('${p.id}', this)"></div><div class="field"><label>Nome</label><input value="${p.name}" onchange="updateField('${p.id}','name', this.value)"></div><div class="field"><label>Data de nascimento</label><input type="date" value="${p.birthdate}" onchange="updateField('${p.id}','birthdate', this.value)"></div><div class="field"><label>Cor do personagem</label><input type="color" value="${p.color}" onchange="updateField('${p.id}','color', this.value)" style="height:38px;padding:3px;"></div></div>`).join('')}</div><div class="card" style="margin-top:18px;"><p style="color:var(--muted);font-size:12.5px;line-height:1.6;">✅ Dados salvos no Supabase — tudo que vocês fizerem aqui persiste entre dispositivos e sessões.</p></div>`;
}
async function updateField(id,field,value){
  state.players[id][field]=value;
  await persistPlayer(id);
  render();
}
function toast(msg,isError){
  const el=document.createElement('div');
  el.className='toast'+(isError?' error':'');
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2800);
}
loadAll();
</script>
</body>
</html>
